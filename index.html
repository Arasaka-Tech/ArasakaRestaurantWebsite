<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arasaka Restaurant 線上點餐</title>
</head>
<body style="margin:0;font-family:Arial, sans-serif;background:#0f172a;color:#e2e8f0;padding:20px;text-align:center;">

    <div style="max-width:900px;margin:0 auto 20px;">
        <h1 style="margin:0 0 6px;color:#f5c542;">Arasaka Restaurant 線上點餐</h1>
        <p style="margin:0;color:#94a3b8;">線上點餐｜飲品極速達</p>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:12px;max-width:900px;margin:0 auto 24px;">
        <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:10px;text-align:left;">
            <img src="img/1.jpg" alt="拿鐵咖啡" style="width:100%;height:150px;object-fit:cover;border-radius:10px;">
            <h3 style="margin:10px 0 4px;">拿鐵咖啡</h3>
            <p style="margin:0;color:#94a3b8;">順口奶香，柔和烘焙</p>
            <span style="display:inline-block;margin-top:6px;padding:4px 10px;border-radius:12px;background:#f5c542;color:#111;font-weight:bold;">NT$120</span>
        </div>
        <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:10px;text-align:left;">
            <img src="img/2.jpg" alt="美式咖啡" style="width:100%;height:150px;object-fit:cover;border-radius:10px;">
            <h3 style="margin:10px 0 4px;">美式咖啡</h3>
            <p style="margin:0;color:#94a3b8;">黑咖啡香氣，清爽無負擔</p>
            <span style="display:inline-block;margin-top:6px;padding:4px 10px;border-radius:12px;background:#f5c542;color:#111;font-weight:bold;">NT$100</span>
        </div>
        <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:10px;text-align:left;">
            <img src="img/3.jpg" alt="抹茶拿鐵" style="width:100%;height:150px;object-fit:cover;border-radius:10px;">
            <h3 style="margin:10px 0 4px;">抹茶拿鐵</h3>
            <p style="margin:0;color:#94a3b8;">濃抹茶粉，融合鮮奶</p>
            <span style="display:inline-block;margin-top:6px;padding:4px 10px;border-radius:12px;background:#f5c542;color:#111;font-weight:bold;">NT$140</span>
        </div>
        <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:10px;text-align:left;">
            <img src="img/4.jpg" alt="可可牛奶" style="width:100%;height:150px;object-fit:cover;border-radius:10px;">
            <h3 style="margin:10px 0 4px;">可可牛奶</h3>
            <p style="margin:0;color:#94a3b8;">可可濃郁，綿密奶泡</p>
            <span style="display:inline-block;margin-top:6px;padding:4px 10px;border-radius:12px;background:#f5c542;color:#111;font-weight:bold;">NT$130</span>
        </div>
    </div>

    <form style="max-width:860px;margin:0 auto;background:#1e293b;border:1px solid #334155;border-radius:14px;padding:18px;text-align:left;">
        <div style="margin-bottom:14px;">
            <h3 style="margin:0 0 6px;">選擇飲品（單選）</h3>
            <label style="display:block;margin:0 0 6px 0;"><input type="radio" name="drink" required> 拿鐵咖啡 NT$120</label>
            <label style="display:block;margin:0 0 6px 0;"><input type="radio" name="drink"> 美式咖啡 NT$100</label>
            <label style="display:block;margin:0 0 6px 0;"><input type="radio" name="drink"> 抹茶拿鐵 NT$140</label>
            <label style="display:block;margin:0 0 6px 0;"><input type="radio" name="drink"> 可可牛奶 NT$130</label>
        </div>

        <div style="margin-bottom:14px;">
            <h3 style="margin:0 0 6px;">甜度（單選）</h3>
            <label style="display:block;margin:0 0 6px 0;"><input type="radio" name="sweet"> 無糖</label>
            <label style="display:block;margin:0 0 6px 0;"><input type="radio" name="sweet"> 微糖</label>
            <label style="display:block;margin:0 0 6px 0;"><input type="radio" name="sweet"> 半糖</label>
            <label style="display:block;margin:0 0 6px 0;"><input type="radio" name="sweet"> 全糖</label>
        </div>

        <div style="margin-bottom:14px;">
            <h3 style="margin:0 0 6px;">冰量（單選）</h3>
            <label style="display:block;margin:0 0 6px 0;"><input type="radio" name="ice"> 去冰</label>
            <label style="display:block;margin:0 0 6px 0;"><input type="radio" name="ice"> 少冰</label>
            <label style="display:block;margin:0 0 6px 0;"><input type="radio" name="ice"> 正常冰</label>
        </div>

        <div style="margin-bottom:14px;">
            <h3 style="margin:0 0 6px;">加料（可複選）</h3>
            <label style="display:block;margin-bottom:4px;"><input type="checkbox" name="topping"> 珍珠</label>
            <label style="display:block;margin-bottom:4px;"><input type="checkbox" name="topping"> 椰果</label>
            <label style="display:block;margin-bottom:4px;"><input type="checkbox" name="topping"> 奶蓋</label>
            <label style="display:block;margin-bottom:4px;"><input type="checkbox" name="topping"> 布丁</label>
        </div>

        <div style="margin-bottom:14px;">
            <h3 style="margin:0 0 6px;">配餐（可複選）</h3>
            <label style="display:block;margin-bottom:4px;"><input type="checkbox" name="side"> 薯條</label>
            <label style="display:block;margin-bottom:4px;"><input type="checkbox" name="side"> 沙拉</label>
            <label style="display:block;margin-bottom:4px;"><input type="checkbox" name="side"> 濃湯</label>
            <label style="display:block;margin-bottom:4px;"><input type="checkbox" name="side"> 炸雞塊</label>
        </div>

        <div style="margin-bottom:14px;">
            <h3 style="margin:0 0 6px;">甜點（可複選）</h3>
            <label style="display:block;margin-bottom:4px;"><input type="checkbox" name="dessert"> 起司蛋糕</label>
            <label style="display:block;margin-bottom:4px;"><input type="checkbox" name="dessert"> 布朗尼</label>
            <label style="display:block;margin-bottom:4px;"><input type="checkbox" name="dessert"> 可頌</label>
        </div>

        <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:14px;">
            <div style="width:100%;max-width:420px;">
                <h3 style="margin:0 0 4px;">姓名</h3>
                <input type="text" placeholder="請輸入姓名" required style="width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0b1220;color:#e2e8f0;">
            </div>
            <div style="width:100%;max-width:420px;">
                <h3 style="margin:0 0 4px;">電話</h3>
                <input type="tel" placeholder="09xx-xxx-xxx" style="width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0b1220;color:#e2e8f0;">
            </div>
            <div style="width:100%;max-width:420px;">
                <h3 style="margin:0 0 4px;">Email</h3>
                <input type="email" placeholder="方便寄送收據 (選填)" style="width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0b1220;color:#e2e8f0;">
            </div>
            <div style="width:100%;max-width:420px;">
                <h3 style="margin:0 0 4px;">取餐時間</h3>
                <input type="time" style="width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0b1220;color:#e2e8f0;">
            </div>
        </div>

        <div style="margin-bottom:14px;">
            <h3 style="margin:0 0 4px;">備註</h3>
            <textarea placeholder="例如：少冰、不要糖、分開包裝" style="width:100%;min-height:80px;padding:10px;border-radius:8px;border:1px solid #334155;background:#0b1220;color:#e2e8f0;"></textarea>
        </div>

        <div style="text-align:center;">
            <button type="submit" style="background:linear-gradient(120deg, #f5c542, #f08e2a);color:#0d1117;border:none;padding:12px 28px;border-radius:18px;font-weight:bold;letter-spacing:0.02em;cursor:pointer;box-shadow:0 10px 24px rgba(240,142,42,0.35);">提交訂單</button>
        </div>
    </form>
</body>
</html>
